<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema High School | الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #05080a; color: #fff; font-family: 'Cairo', sans-serif; margin: 0; }
        .header { text-align: center; padding: 20px; border-bottom: 2px solid #00ffd5; box-shadow: 0 0 15px #00ffd5; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #0d1117; border-radius: 10px; border: 1px solid #222; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #00ffd5; transform: translateY(-5px); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card h3 { font-size: 13px; padding: 10px; margin: 0; text-align: center; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        iframe { width: 90%; height: 60%; border: 2px solid #00ffd5; border-radius: 10px; }
        .btn-close { margin-top: 20px; background: #ff4444; color: #fff; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><h1>CINEMA HIGH SCHOOL</h1></div>
    <div id="movieGrid" class="grid"></div>

    <div id="overlay">
        <iframe id="videoPlayer" src="" allowfullscreen></iframe>
        <button class="btn-close" onclick="closePlayer()">إغلاق</button>
    </div>

    <script>
        async function loadMovies() {
            const res = await fetch('/api/movies');
            const movies = await res.json();
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = movies.map(m => `
                <div class="card" onclick="openPlayer('${m.link}')">
                    <img src="https://images.weserv.nl/?url=${m.poster}">
                    <h3>${m.title}</h3>
                </div>
            `).join('');
        }
        function openPlayer(url) {
            document.getElementById('videoPlayer').src = url;
            document.getElementById('overlay').style.display = 'flex';
        }
        function closePlayer() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('videoPlayer').src = '';
        }
        window.onload = loadMovies;
    </script>
</body>
</html>
