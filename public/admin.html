<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Cinema HS</title>
    <style>
        body { background: #05080a; color: #00ffd5; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        form { background: #0d1117; padding: 30px; border-radius: 15px; border: 1px solid #00ffd5; width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00ffd5; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>إضافة فيلم للسيرفر الخاص</h2>
    <form action="/api/movies" method="POST">
        <input type="text" name="title" placeholder="اسم الفيلم أو الأنمي" required>
        <input type="text" name="poster" placeholder="رابط صورة البوستر" required>
        <input type="text" name="link" placeholder="رابط الـ Embed (Streamtape)" required>
        <button type="submit">حفظ ونشر على الموقع</button>
    </form>
    <p id="msg"></p>
    <script>
        if(window.location.search.includes('success')) document.getElementById('msg').innerText = "✅ تم إضافة الفيلم بنجاح!";
    </script>
</body>
</html>
